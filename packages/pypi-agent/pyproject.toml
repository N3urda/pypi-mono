[project]
name = "pypi-agent"
version = "0.0.1"
description = "Agent runtime with tool execution loop"
requires-python = ">=3.10"
dependencies = [
    "pypi-ai",
    "pydantic>=2.0.0",
    "anyio>=4.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "mypy>=1.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pypi_agent"]