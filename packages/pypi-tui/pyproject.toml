[project]
name = "pypi-tui"
version = "0.0.1"
description = "Terminal UI components for pypi agent"
requires-python = ">=3.10"
dependencies = [
    "pypi-ai",
    "pypi-agent",
    "textual>=0.60.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pypi_tui"]