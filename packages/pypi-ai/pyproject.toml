[project]
name = "pypi-ai"
version = "0.0.1"
description = "Unified LLM API abstraction with multi-provider support"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0.0",
    "anthropic>=0.40.0",
    "openai>=1.50.0",
    "google-generativeai>=0.8.0",
    "mistralai>=1.0.0",
    "anyio>=4.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "mypy>=1.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pypi_ai"]

[tool.mypy]
python_version = "3.10"
strict = true
plugins = ["pydantic.mypy"]